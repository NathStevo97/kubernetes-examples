apiVersion: k3d.io/v1alpha5
kind: Simple
servers: 1
agents: 3
image: rancher/k3s:v1.36.1-k3s1@sha256:08fdebd14db9ab7d5ea821d5bfa95d02341a6ef886842fcc8d9dfd0e9fa9e0cd
registries:
  create:
    name: registry.labs
    host: "0.0.0.0"
    hostPort: "5000"
volumes:
  - volume: /tmp/volumes/k3d/:/volumes/k3d
    nodeFilters:
      - agent:*
ports:
  - port: 30000:30000
    nodeFilters:
      - agent:0
  - port: 30001:30001
    nodeFilters:
      - agent:0
  - port: 30002:30002
    nodeFilters:
      - agent:0
options:
  k3d:
    wait: true
    timeout: "60s"
    disableImageVolume: false
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
  k3s:
    extraArgs:
      - arg: "--disable=traefik"
        nodeFilters:
        - server:*
    nodeLabels:
      - label: sharedvol=true
        nodeFilters:
          - agent:*
